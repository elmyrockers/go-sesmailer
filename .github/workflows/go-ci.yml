name: Build / CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    # Checkout the repository
    - name: Checkout code
      uses: actions/checkout@v3

    # Setup Go environment
    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: 1.24

    # Install dependencies
    - name: Install dependencies
      run: go mod tidy

    # Build check to ensure code compiles
    - name: Build
      run: go build ./...

    # Run unit tests and generate coverage (excluding examples/)
    - name: Run tests with coverage (excluding examples/)
      run: |
        go list ./... | grep -v /examples | xargs go test -v -coverprofile=coverage.out

    # Generate coverage badge
    - name: Generate coverage badge
      run: |
        # Get total coverage %
            COVERAGE=$(go tool cover -func=coverage.out | grep total: | awk '{print $3}' | sed 's/%//')
        # Decide color
            COLOR=brightgreen
            if (( $(echo "$COVERAGE < 80" | bc -l) )); then COLOR=red; fi
        # Generate badge using Shields.io
            curl -s "https://img.shields.io/badge/coverage-${COVERAGE}%25-${COLOR}" > coverage.svg

    # Commit coverage badge
    - name: Commit coverage badge
      run: |
        git config --global user.name "github-actions"
        git config --global user.email "actions@github.com"
        git add coverage.svg
        git commit -m "Update coverage badge" || echo "No changes"
        git push

    # Lint the code for style and quality
    - name: Lint
      run: |
        go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
        golangci-lint run