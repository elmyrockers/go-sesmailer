name: Build / CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      run_integration:
        description: 'Run integration tests?'
        required: false
        default: 'false'

# Give actions-user a permission to commit (for coverage.svg)
permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    # Checkout the repository
    - name: Checkout code
      uses: actions/checkout@v4

    # Setup Go environment
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: 1.24

    # Install dependencies
    - name: Install dependencies
      run: go mod tidy

    # Build check to ensure code compiles
    - name: Build
      run: go build ./...

    # Run unit tests (excluding examples/)
    - name: Run unit tests with coverage
      run: |
        go test -v -short -coverprofile=unit.out $(go list ./... | grep -v /examples)

    # Run integration tests (excluding examples/)
    - name: Run integration tests with coverage
      if: ${{ github.event.inputs.run_integration == 'true' }}
      env:
        AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        AWS_REGION: ${{ secrets.AWS_REGION }}
      run: |
        go test -v -run Integration -coverprofile=integration.out $(go list ./... | grep -v /examples)

    # Merge coverage (unit.out + integration.out = coverage.out)
    - name: Merge coverage
      if: ${{ github.event.inputs.run_integration == 'true' }}
      run: |
        echo "mode: set" > coverage.out
        tail -n +2 unit.out >> coverage.out
        tail -n +2 integration.out >> coverage.out

    # Generate HTML coverage report
    - name: Generate HTML coverage report
      if: ${{ github.event.inputs.run_integration == 'true' }}
      run: |
        go tool cover -html=coverage.out -o coverage.html

    # Check if HTML coverage exists
    - name: Check if coverage HTML exists
      if: ${{ github.event.inputs.run_integration == 'true' }}
      id: coverage-html
      run: |
        if [ -f coverage.html ] && [ -s coverage.html ]; then
          echo "changed=true" >> $GITHUB_OUTPUT
        else
          echo "changed=false" >> $GITHUB_OUTPUT
        fi

    # Upload coverage HTML if changed
    - name: Upload coverage HTML if changed
      if: ${{ github.event.inputs.run_integration == 'true' && steps.coverage-html.outputs.changed == 'true' }}
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: coverage.html



    # Generate coverage badge
    - name: Generate coverage badge
      if: ${{ github.event.inputs.run_integration == 'true' }}
      run: |
        # Get total coverage %
            COVERAGE=$(go tool cover -func=coverage.out | grep total: | awk '{print $3}' | sed 's/%//')
        # Decide color
            COLOR=brightgreen
            if (( $(echo "$COVERAGE < 80" | bc -l) )); then COLOR=red; fi
        # Generate badge using Shields.io
            curl -s "https://img.shields.io/badge/coverage-${COVERAGE}%25-${COLOR}" > coverage.svg

    # Commit coverage badge 
    - name: Commit coverage badge
      if: ${{ github.event.inputs.run_integration == 'true' }}
      run: |
        # Configure Git for GitHub Actions
        git config --global user.name "github-actions"
        git config --global user.email "actions@github.com"

        # Add the coverage badge
        git add coverage.svg
        
        # Only commit if there are changes
        if ! git diff --cached --quiet; then
            git commit -m "Changes detected, update coverage badge"
            git push
        else
            echo "No changes to commit"
        fi

    # Lint the code for style and quality
    - name: Lint
      run: |
        go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
        golangci-lint run